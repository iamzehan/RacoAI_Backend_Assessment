version: "3.9"

services:
  app:
    build: .
    container_name: racoai-api
    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - redis

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev

  redis:
    image: redis:7-alpine
    container_name: racoai-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

volumes:
  redis_data: